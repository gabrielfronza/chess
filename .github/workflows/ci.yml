name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json
            apps/mobile/package-lock.json
            packages/contracts/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm ci --prefix apps/api

      - name: Install mobile dependencies
        run: npm ci --prefix apps/mobile

      - name: Install contracts dependencies
        run: npm ci --prefix packages/contracts

      - name: Run affected quality targets
        env:
          NX_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          NX_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: npx nx affected -t lint test build --base="$NX_BASE" --head="$NX_HEAD" --parallel=3
