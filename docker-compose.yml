name: chess_app

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chess_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chess_app_local}
      POSTGRES_DB: ${POSTGRES_DB:-chess_app_dev}
    ports:
      - "${POSTGRES_PORT:-54329}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-chess_app} -d $${POSTGRES_DB:-chess_app_dev}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
